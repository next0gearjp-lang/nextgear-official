<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXT GEAR | Professional Logistics</title>
    <style>
        :root {
            --bg-base: #050505; 
            --bg-sub: #0f0f0f;  
            --text-main: #f0f0f0; 
            --text-sub: #666666;  
            --m1-color: #0088ff; 
            --m2-color: #ff3366; 
            --transition: 1.2s cubic-bezier(0.2, 1, 0.2, 1);
        }

        body {
            margin: 0;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 💡 背景の流れる文字：さらに薄く、上品に */
        .marquee-bg {
            position: fixed;
            top: 25%;
            left: 0;
            width: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.015; 
        }

        .marquee-inner {
            display: flex;
            white-space: nowrap;
            font-size: 15rem;
            font-weight: 900;
            animation: marquee 60s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- HERO --- */
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 15%;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            margin: 0;
            font-weight: 200;
            letter-spacing: 0.15em;
            line-height: 1.2;
        }

        .hero span {
            display: block;
            font-weight: 800;
            color: #fff;
        }

        /* --- MEMBERS SECTION (ここを大幅調整) --- */
        .section-label {
            padding: 0 15%;
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 60px;
        }

        .members-grid {
            padding: 0 15% 150px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 100px; /* 余白を広く取る */
        }

        .member-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* 左寄せにして知的な印象に */
            transition: var(--transition);
            cursor: pointer;
            width: 100%;
            max-width: 320px; /* 💡 画像の最大幅を制限（小さくする） */
            margin: 0 auto;
        }

        /* 互い違いの微調整（ReeL風のリズム） */
        .member-item:nth-child(even) { margin-top: 120px; }

        .image-wrapper {
            width: 100%;
            overflow: hidden;
            aspect-ratio: 3 / 4; /* 少し縦長にしてシュッとさせる */
            background-color: #111;
            border-radius: 2px;
        }

        .member-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.7);
            transition: 1.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .member-item:hover img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.03);
        }

        .member-name {
            margin-top: 25px;
            font-size: 1rem; /* 💡 文字も小さく、上品に */
            font-weight: 600;
            letter-spacing: 0.3em;
            color: #fff;
        }

        /* --- DETAIL PANEL --- */
        .detail-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base);
            z-index: 100;
            display: flex;
            transform: translateY(100%); /* 💡 下からスッと出てくる演出 */
            transition: var(--transition);
        }

        .detail-overlay.open { transform: translateY(0); }

        .detail-content {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            padding: 10% 15%;
            align-items: center;
        }

        .detail-text h2 { font-size: 3rem; margin: 0; font-weight: 800; color: #fff; }
        .detail-text p { font-size: 1rem; line-height: 2; color: #aaa; margin-top: 30px; }

        .close-btn {
            position: absolute;
            top: 50px; right: 10%;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            border-bottom: 1px solid #444;
            color: #888;
        }

        footer {
            padding: 100px 15% 50px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 0.2em;
            border-top: 1px solid #111;
        }

        @media (max-width: 768px) {
            .hero, .members-grid, .section-label { padding: 0 8%; }
            .members-grid { grid-template-columns: 1fr; gap: 60px; }
            .member-item:nth-child(even) { margin-top: 0; }
            .detail-content { grid-template-columns: 1fr; padding: 20% 8%; }
        }
    </style>
</head>
<body>

    <div class="marquee-bg">
        <div class="marquee-inner">
            NEXT GEAR SHIL LUA MIA / NEXT GEAR SHIL LUA MIA / 
        </div>
    </div>

    <section class="hero">
        <p style="letter-spacing: 0.6em; color: #333; margin-bottom: 20px; font-size: 0.7rem;">MANAGED BY SHIL</p>
        <h1>NEXT<span>GEAR</span></h1>
    </section>

    <p class="section-label">Selected Members</p>
    
    <section class="members-grid">
        <div class="member-item" onclick="openDetail('lua')">
            <div class="image-wrapper">
                <img src="./member01.jpg" alt="LUA">
            </div>
            <div class="member-name">LUA</div>
        </div>
        <div class="member-item" onclick="openDetail('mia')">
            <div class="image-wrapper">
                <img src="./member02.jpg" alt="MIA">
            </div>
            <div class="member-name">MIA</div>
        </div>
    </section>

    <div id="detailOverlay" class="detail-overlay">
        <div class="close-btn" onclick="closeDetail()">Back — Index</div>
        
        <div id="detailContent" class="detail-content">
            <div class="detail-img-box">
                <img id="innerImg" src="" style="width: 70%; aspect-ratio: 3/4; object-fit: cover;">
            </div>
            <div class="detail-text">
                <h2 id="innerName">NAME</h2>
                <div id="innerColor" style="height: 1px; width: 40px; margin: 25px 0;"></div>
                <p id="innerText">...</p>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 NEXT GEAR. ALL RIGHTS RESERVED.
    </footer>

    <script>
        const memberData = {
            lua: {
                name: "LUA",
                text: "るあです。Next Gearの技術担当。マイクラサーバーの設計から運用まで、目に見えないインフラを美しく整えます。",
                color: "var(--m1-color)",
                img: "./member01.jpg"
            },
            mia: {
                name: "MIA",
                text: "みあです。クリエイティブ支援を担当。動画編集やデザインを通じて、メンバーの個性を最大化させる表現を追求します。",
                color: "var(--m2-color)",
                img: "./member02.jpg"
            }
        };

        function openDetail(id) {
            const data = memberData[id];
            document.getElementById('innerName').innerText = data.name;
            document.getElementById('innerText').innerText = data.text;
            document.getElementById('innerImg').src = data.img;
            document.getElementById('innerColor').style.backgroundColor = data.color;
            document.getElementById('detailOverlay').classList.add('open');
            document.body.style.overflow = 'hidden'; 
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('open');
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
