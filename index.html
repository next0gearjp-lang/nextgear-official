<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXT GEAR | Professional Logistics</title>
    <style>
        :root {
            --bg-base: #050505; 
            --bg-sub: #0f0f0f;  
            --text-main: #f0f0f0; 
            --text-sub: #666666;  
            --m1-color: #0088ff; 
            --m2-color: #4CAF50; 
            --transition: 1.2s cubic-bezier(0.2, 1, 0.2, 1);
        }

        body {
            margin: 0;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景ギミック */
        .marquee-bg {
            position: fixed;
            top: 25%;
            left: 0;
            width: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.015; 
        }

        .marquee-inner {
            display: flex;
            white-space: nowrap;
            font-size: 15rem;
            font-weight: 900;
            animation: marquee 60s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* HERO */
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 15%;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            margin: 0;
            font-weight: 200;
            letter-spacing: 0.15em;
            line-height: 1.2;
        }

        .hero span {
            display: block;
            font-weight: 800;
            color: #fff;
        }

        /* MEMBERS */
        .section-label {
            padding: 0 15%;
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 60px;
        }

        .members-grid {
            padding: 0 15% 150px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 100px;
        }

        .member-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: var(--transition);
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .member-item:nth-child(even) { margin-top: 120px; }

        .image-wrapper {
            width: 100%;
            overflow: hidden;
            aspect-ratio: 3 / 4;
            background-color: #111;
        }

        .member-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.7);
            transition: 1.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .member-item:hover img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.03);
        }

        .member-name {
            margin-top: 25px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            color: #fff;
        }

        /* DETAIL PANEL */
        .detail-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base);
            z-index: 100;
            display: flex;
            transform: translateY(100%);
            transition: var(--transition);
            overflow-y: auto;
        }

        .detail-overlay.open { transform: translateY(0); }

        .detail-content {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            padding: 10% 15%;
            align-items: start;
        }

        .detail-text h2 { font-size: 3rem; margin: 0; font-weight: 800; color: #fff; letter-spacing: 0.1em; }
        .detail-text p { font-size: 0.9rem; line-height: 2; color: #aaa; margin-top: 30px; }

        /* SNS Links Style */
        .sns-links {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding-bottom: 50px;
        }

        .sns-links a {
            color: #fff;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            border-bottom: 1px solid #333;
            padding-bottom: 3px;
            transition: 0.3s;
        }

        .sns-links a:hover {
            color: #fff;
            border-bottom: 1px solid #fff;
            opacity: 0.7;
        }

        .close-btn {
            position: fixed;
            top: 50px; right: 10%;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            border-bottom: 1px solid #444;
            color: #888;
            z-index: 101;
        }

        footer {
            padding: 100px 15% 50px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 0.2em;
            border-top: 1px solid #111;
        }

        @media (max-width: 768px) {
            .members-grid { grid-template-columns: 1fr; gap: 60px; }
            .member-item:nth-child(even) { margin-top: 0; }
            .detail-content { grid-template-columns: 1fr; padding: 20% 8%; }
            .detail-text h2 { font-size: 2.5rem; }
            .close-btn { top: 30px; right: 8%; }
        }
    </style>
</head>
<body>

    <div class="marquee-bg">
        <div class="marquee-inner">
            NEXT GEAR SHIL LIFE NYATSUME / NEXT GEAR SHIL LIFE NYATSUME / 
        </div>
    </div>

    <section class="hero">
        <p style="letter-spacing: 0.6em; color: #333; margin-bottom: 20px; font-size: 0.7rem;">MANAGED BY SHIL</p>
        <h1>NEXT<span>GEAR</span></h1>
    </section>

    <p class="section-label">Selected Members</p>
    
    <section class="members-grid">
        <div class="member-item" onclick="openDetail('life')">
            <div class="image-wrapper">
                <img src="./zero.png" alt="LIFE">
            </div>
            <div class="member-name">LIFE</div>
        </div>
        <div class="member-item" onclick="openDetail('nyatsume')">
            <div class="image-wrapper">
                <img src="./natume.png" alt="NYATSUME">
            </div>
            <div class="member-name">NYATSUME</div>
        </div>
    </section>

    <div id="detailOverlay" class="detail-overlay">
        <div class="close-btn" onclick="closeDetail()">Back — Index</div>
        
        <div id="detailContent" class="detail-content">
            <div class="detail-img-box">
                <img id="innerImg" src="" style="width: 70%; aspect-ratio: 3/4; object-fit: cover;">
            </div>
            <div class="detail-text">
                <h2 id="innerName">NAME</h2>
                <div id="innerColor" style="height: 1px; width: 40px; margin: 25px 0;"></div>
                <p id="innerText">...</p>
                <div id="snsArea" class="sns-links"></div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 NEXT GEAR. ALL RIGHTS RESERVED.
    </footer>

    <script>
        const memberData = {
            life: {
                name: "LIFE",
                text: "ゲーム配信、雑談をメインに活動中！\n配信時間は夜がメイン！告知はなく急に始まるので「やってるから行こう」位の気軽さで来てください。\n飲み会配信やラジオもしてるので、ジュース片手に覗きに来てね。ROMも大歓迎です！",
                color: "var(--m1-color)",
                img: "./zero.png",
                links: [
                    { label: "X", url: "https://x.com/0life_game" },
                    { label: "YOUTUBE", url: "https://t.co/6HemoVdTf8" },
                    { label: "TWITCH", url: "https://t.co/4KlyfNtd5x" },
                    { label: "TIKTOK", url: "https://www.tiktok.com/@user324520832" },
                    { label: "MARSHMALLOW", url: "https://marshmallow-qa.com/tz1xglj9o5cscso?t=Jl9HTW&utm_medium=url_text&utm_source=promotion" },
                    { label: "LIT.LINK (RULES)", url: "https://t.co/w4wRHskof3" }
                ]
            },
            nyatsume: {
                name: "NYATSUME",
                text: "誕生日：12月8日\nAPEX感度：3200DPI 1.33\n\n【基本配信時間】\n火水日：15時～25時のどこか（配信通知ON推奨！）\n\n【Game】\nAPEX / Minecraft / R.E.P.O. / ForzaHorizon / Switch / Among US / WoTB / Shadowverse(Los所属) / Fortnite / VALORANT / OW2 / Marvel Rivals / GTA V\n\n【Goal】\n・SNS合計フォロワー3000人\n・Twitch配信平均同接10人以上\n・ストグラに参加する\n\nみどりとゲームが大好きで、ひとつの事に真っ直ぐ。気分屋で記憶力はおじいちゃんですが、毎日楽しく活動しています！",
                color: "var(--m2-color)",
                img: "./natume.png",
                links: [
                    { label: "X", url: "https://x.com/Natume_1208" },
                    { label: "TWITCH", url: "https://t.co/U65Dds4tE0" },
                    { label: "YOUTUBE", url: "https://www.youtube.com/@%E3%81%AA%E3%82%83%E3%81%A4%E3%82%81" },
                    { label: "TIKTOK", url: "https://www.tiktok.com/@natume_1208" },
                    { label: "MARSHMALLOW", url: "https://marshmallow-qa.com/yz10pr3nyqdn60a?t=lV0LIb&utm_medium=url_text&utm_source=promotion" },
                    { label: "WISH LIST", url: "https://www.amazon.jp/hz/wishlist/ls/2EJG6OJG9CTPB?ref_=wl_share" },
                    { label: "LIT.LINK", url: "https://t.co/s37Zw484HZ" }
                ]
            }
        };

        function openDetail(id) {
            const data = memberData[id];
            document.getElementById('innerName').innerText = data.name;
            document.getElementById('innerText').style.whiteSpace = "pre-wrap"; 
            document.getElementById('innerText').innerText = data.text;
            document.getElementById('innerImg').src = data.img;
            document.getElementById('innerColor').style.backgroundColor = data.color;
            
            const snsArea = document.getElementById('snsArea');
            snsArea.innerHTML = "";
            if(data.links) {
                data.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.target = "_blank";
                    a.innerText = link.label;
                    snsArea.appendChild(a);
                });
            }

            document.getElementById('detailOverlay').classList.add('open');
            document.body.style.overflow = 'hidden'; 
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('open');
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
