<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXT GEAR Official</title>
    <style>
        body { 
            background: #000; 
            color: #0088ff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .logo {
            font-size: 5rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
            text-transform: uppercase;
            position: relative;
            animation: drive 1s ease-out forwards;
        }
        @keyframes drive {
            0% { transform: translateX(-100px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .sub {
            color: #fff;
            font-size: 1rem;
            margin-top: 10px;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="logo">NEXT GEAR</div>
    <div class="sub">SHIFT TO THE NEXT STAGE</div>
</body>
</html>
