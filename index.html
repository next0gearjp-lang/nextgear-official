<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXT GEAR | Professional Logistics</title>
    <style>
        :root {
            /* 💡 ダークモード：漆黒とグレー、そしてアクセント */
            --bg-base: #050505; /* 漆黒 */
            --bg-sub: #111111;  /* パネルやカードの黒 */
            --text-main: #f0f0f0; /* 白に近いグレー */
            --text-sub: #888888;  /* 暗いグレー */
            --accent: #222222;
            --m1-color: #0088ff; /* LUA：テックブルー */
            --m2-color: #ff3366; /* MIA：ネオンピンク */
            --transition: 1.2s cubic-bezier(0.2, 1, 0.2, 1);
        }

        body {
            margin: 0;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 💡 ギミック：背景にあるような、主張しすぎない流れる文字（ネオン風） */
        .marquee-bg {
            position: fixed;
            top: 20%;
            left: 0;
            width: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.02; /* 極限まで薄く、光っているように */
        }

        .marquee-inner {
            display: flex;
            white-space: nowrap;
            font-size: 18rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #555; /* 暗いグレー */
            animation: marquee 60s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- HEADER / HERO --- */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }

        .hero h1 {
            font-size: clamp(3rem, 12vw, 9rem);
            margin: 0;
            font-weight: 300;
            letter-spacing: 0.1em;
            line-height: 1;
            color: #fff;
        }

        .hero span {
            display: block;
            font-weight: 800;
            margin-top: 10px;
        }

        /* --- MEMBERS SECTION --- */
        .section-label {
            padding: 0 10%;
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .members-grid {
            padding: 0 10% 100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px; /* 細いラインでの区切り */
            background-color: rgba(255,255,255,0.03); /* 薄い白のライン */
        }

        .member-item {
            background-color: var(--bg-base);
            padding: 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }

        /* 互い違いの余白演出 */
        .member-item:nth-child(even) { margin-top: 80px; }

        .image-wrapper {
            width: 80%;
            overflow: hidden;
            aspect-ratio: 4 / 5;
            background-color: #222;
        }

        .member-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.8); /* 最初は暗くモノクロ */
            transition: 1.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .member-item:hover img {
            filter: grayscale(0%) brightness(1); /* カラーになり明るくなる */
            transform: scale(1.05);
        }

        .member-name {
            margin-top: 30px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #fff;
        }

        /* --- DETAIL PANEL (オーバーレイ) --- */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-base);
            z-index: 100;
            display: flex;
            transform: translateX(100%);
            transition: var(--transition);
        }

        .detail-overlay.open { transform: translateX(0); }

        .detail-content {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 10% ;
            align-items: center;
            background-color: var(--bg-sub); /* 詳細パネルの背景を少し明るい黒に */
        }

        .detail-text h2 { font-size: 4rem; margin: 0; font-weight: 800; color: #fff; }
        .detail-text p { font-size: 1.1rem; line-height: 2; color: #ccc; margin-top: 40px; }

        .close-btn {
            position: absolute;
            top: 50px;
            right: 10%;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-bottom: 1px solid #fff;
            color: #fff;
        }

        footer {
            padding: 100px 10% 40px;
            font-size: 0.7rem;
            color: #444; /* フッターは暗く */
            letter-spacing: 0.1em;
        }

        /* モバイル対応 */
        @media (max-width: 768px) {
            .members-grid { grid-template-columns: 1fr; }
            .member-item:nth-child(even) { margin-top: 0; }
            .detail-content { grid-template-columns: 1fr; padding: 20% 10%; }
        }
    </style>
</head>
<body>

    <div class="marquee-bg">
        <div class="marquee-inner">
            NEXT GEAR SHIL LUA MIA / NEXT GEAR SHIL LUA MIA / 
        </div>
    </div>

    <section class="hero">
        <p style="letter-spacing: 0.5em; color: #444; margin-bottom: 20px;">EST. 2026</p>
        <h1>NEXT<span>GEAR</span></h1>
    </section>

    <p class="section-label">Selected Members</p>
    
    <section class="members-grid">
        <div class="member-item" onclick="openDetail('lua')">
            <div class="image-wrapper">
                <img src="./member01.jpg" alt="LUA">
            </div>
            <div class="member-name">LUA</div>
        </div>
        <div class="member-item" onclick="openDetail('mia')">
            <div class="image-wrapper">
                <img src="./member02.jpg" alt="MIA">
            </div>
            <div class="member-name">MIA</div>
        </div>
    </section>

    <div id="detailOverlay" class="detail-overlay">
        <div class="close-btn" onclick="closeDetail()">Close — Index</div>
        
        <div id="detailContent" class="detail-content">
            <div class="detail-img-box">
                <img id="innerImg" src="" style="width: 80%; aspect-ratio: 4/5; object-fit: cover; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            </div>
            <div class="detail-text">
                <h2 id="innerName">NAME</h2>
                <div id="innerColor" style="height: 2px; width: 60px; margin: 30px 0;"></div>
                <p id="innerText">ここに自己紹介が入ります。ReeLのような落ち着いたトーンで、Next Gearのミッションを語ります。</p>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 NEXT GEAR. ALL RIGHTS RESERVED. MANAGED BY SHIL.
    </footer>

    <script>
        const memberData = {
            lua: {
                name: "LUA",
                text: "るあです。Next Gearの技術担当。マイクラサーバーの設計から運用まで、目に見えないインフラを美しく整えます。",
                color: "var(--m1-color)",
                img: "./member01.jpg"
            },
            mia: {
                name: "MIA",
                text: "みあです。クリエイティブ支援を担当。動画編集やデザインを通じて、メンバーの個性を最大化させる表現を追求します。",
                color: "var(--m2-color)",
                img: "./member02.jpg"
            }
        };

        function openDetail(id) {
            const data = memberData[id];
            document.getElementById('innerName').innerText = data.name;
            document.getElementById('innerText').innerText = data.text;
            document.getElementById('innerImg').src = data.img;
            document.getElementById('innerColor').style.backgroundColor = data.color;
            
            document.getElementById('detailOverlay').classList.add('open');
            document.body.style.overflow = 'hidden'; // 背景スクロール禁止
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('open');
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
